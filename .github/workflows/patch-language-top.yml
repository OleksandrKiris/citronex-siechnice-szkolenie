name: Patch language selector to top

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[skip-lang-patch]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Move language selector to top
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          t = p.read_text(encoding='utf-8').replace('\r\n', '\n')
          original = t

          if 'id="langTop"' not in t:
              t = t.replace(
                  '.meta { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 14px; }\n    .badge { background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.26); border-radius: 999px; padding: 6px 9px; font-size: 11px; font-weight: 900; }',
                  '.meta { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 14px; }\n    .badge { background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.26); border-radius: 999px; padding: 6px 9px; font-size: 11px; font-weight: 900; }\n    .lang-top { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 14px; }\n    .lang-top button { min-height: 38px; padding: 0 6px; border-radius: 999px; border: 1px solid rgba(255,255,255,.28); background: rgba(255,255,255,.12); color: white; font-size: 12px; box-shadow: none; }\n    .lang-top button.active { background: var(--yellow); border-color: var(--yellow); color: #17311f; }'
              )
              t = t.replace(
                  '<p class="subtitle" id="subtitle"></p>\n      <div class="meta"><span class="badge">PL</span><span class="badge">EN</span><span class="badge">UA</span><span class="badge">RU</span><span class="badge">AZ</span><span class="badge">OFFLINE</span></div>',
                  '<p class="subtitle" id="subtitle"></p>\n      <div class="lang-top" id="langTop"></div>\n      <div class="meta"><span class="badge">OFFLINE</span><span class="badge">SIECHNICE</span><span class="badge">CITRONEX</span></div>'
              )
              t = t.replace(
                  "const subtitle = document.getElementById('subtitle');",
                  "const subtitle = document.getElementById('subtitle');\n    const langTop = document.getElementById('langTop');"
              )
              t = t.replace(
                  "function setLang(lang) { state.lang = lang; state.screen = 0; render(); }",
                  "function setLang(lang) { state.lang = lang; render(); }"
              )
              t = t.replace(
                  '''        <div class="card">
          <h2>${esc(L.chooseLanguage)}</h2>
          <div class="choice-grid">
            ${Object.keys(DATA.i18n).map(lang => `<button class="choice ${state.lang === lang ? 'active' : ''}" onclick="setLang('${lang}')">${esc(DATA.i18n[lang].languageName)}</button>`).join('')}
          </div>
        </div>
''',
                  ''
              )
              t = t.replace(
                  "subtitle.textContent = L.subtitle;\n      screens.innerHTML = allScreensHtml();",
                  "subtitle.textContent = L.subtitle;\n      document.documentElement.lang = state.lang.toLowerCase();\n      langTop.innerHTML = Object.keys(DATA.i18n).map(lang => `<button class=\"${state.lang === lang ? 'active' : ''}\" onclick=\"setLang('${lang}')\" title=\"${esc(DATA.i18n[lang].languageName)}\">${esc(lang)}</button>`).join('');\n      screens.innerHTML = allScreensHtml();"
              )

          if t != original:
              p.write_text(t, encoding='utf-8', newline='\n')
              print('index.html patched')
          else:
              print('no changes needed')
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet index.html; then
            echo "No index change"
          else
            git add index.html
            git commit -m "Move language selector to top [skip-lang-patch]"
            git push origin HEAD:main
            git push -f origin HEAD:gh-pages
          fi
# trigger: crlf-fixed
