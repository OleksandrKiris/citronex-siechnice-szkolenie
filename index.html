tContent=L.mapsTitle;$('mapsText').textContent=L.mapsText;const keys=['office','main','e1','e2','e3','e4','e5','e6'];$('stages').innerHTML=keys.map((k,i)=>`<a class="stage" href="${MAPS[k]}" target="_blank" rel="noopener"><div class="ico">${i?i:'B'}</div><div><strong>${L.stages[i]}</strong><span>${L.open}</span></div></a>`).join('');$('firstTitle').textContent=L.firstTitle;$('firstSteps').innerHTML=st(L.first);$('mapWarnTitle').textContent=L.mapWarnTitle;$('mapWarn').textContent=L.mapWarn;$('readerTitle').textContent=L.readerTitle;$('readerText').textContent=L.readerText;$('phoneTitle').textContent=L.phoneTitle;$('phoneText').textContent=L.phoneText;$('android').innerHTML=st(L.android);$('iphone').innerHTML=st(L.iphone);$('testTitle').textContent=L.testTitle;$('testText').textContent=L.testText;$('quiz').innerHTML=L.quiz.map((q,qi)=>`<h2>${q[0]}</h2>${q[1].map((a,ai)=>`<button data-q="${qi}" data-a="${ai}">${a}</button>`).join('')}`).join('');$('problemTitle').textContent=L.problemTitle;$('problemText').textContent=L.problemText;$('problemDoTitle').textContent=L.problemDoTitle;$('problemSteps').innerHTML=st(L.problemSteps);document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>go(b.dataset.go));document.querySelectorAll('#quiz button').forEach(b=>b.onclick=()=>{const q=L.quiz[+b.dataset.q];b.classList.add(+b.dataset.a===q[2]?'good':'bad')});renderReader();go(screen)}document.querySelectorAll('#langs button').forEach(b=>b.onclick=()=>{lang=b.dataset.lang;render()});$('tabRows').onclick=()=>{readerMode='rows';renderReader()};$('tabOutside').onclick=()=>{readerMode='outside';renderReader()};render();
