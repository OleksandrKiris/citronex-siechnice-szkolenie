<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      margin: 10px 0 8px;
      color: #fff;
      font-size: clamp(30px, 6vw, 58px);
      line-height: 1;
    }
    img {
      display: block;
      width: 100%;
      height: calc(100vh - 76px);
      object-fit: contain;
      object-position: center;
    }
  </style>
</head>
<body>
  <h1>Hello</h1>
  <img src="https://funny.klev.club/uploads/posts/2024-03/funny-klev-club-p-smeshnie-kartinki-s-fakyu-4.jpg" alt="Gorilla">
</body>
</html>
